name: CI/CD Pipeline

on:
  push:
    branches: [release, main]

jobs:
  # --- Phase 1: Quality Control ---
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Block if 'fail build' exists
        run: |
          if grep -ri --exclude-dir=.github "fail build" .; then
            echo "::error::Found 'fail build' string. Aborting job."
            exit 1
          fi

      - name: Lint and Build
        run: echo "Building application..."

  # --- Phase 2: Pre-Production ---
  canary:
    needs: lint-and-build
    environment: canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Block if 'fail canary' exists
        run: |
          if grep -ri --exclude-dir=.github "fail canary" .; then
            echo "::error::Found 'fail canary' string. Aborting canary deployment."
            exit 1
          fi

      - name: Deploy to Canary
        run: echo "Deploying to Canary..."

  staging:
    needs: canary
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block if 'fail staging' exists
        run: |
          if grep -ri --exclude-dir=.github "fail staging" .; then
            echo "::error::Found 'fail staging' string. Aborting staging deployment."
            exit 1
          fi

      - name: Deploy to Staging
        run: echo "Deploying to Staging..."

  # --- Phase 3: Regional Production Rollout ---
  deploy-east:
    needs: staging
    environment: production-east
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block if 'fail east' exists
        run: |
          if grep -ri --exclude-dir=.github "fail east" .; then
            echo "::error::Found 'fail east' string. Aborting East Coast rollout."
            exit 1
          fi

      - name: Deploy to East Coast
        run: echo "Deploying to production-east..."

  deploy-west:
    needs: deploy-east 
    environment: production-west
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block if 'fail west' exists
        run: |
          if grep -ri --exclude-dir=.github "fail west" .; then
            echo "::error::Found 'fail west' string. Aborting West Coast rollout."
            exit 1
          fi

      - name: Deploy to West Coast
        run: echo "Deploying to production-west..."